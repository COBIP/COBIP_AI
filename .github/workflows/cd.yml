name: CD

"on":
  workflow_dispatch:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Deploy on EC2 via SSM (docker compose)
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_PROJECT_PATH: ${{ secrets.AWS_PROJECT_PATH }}
          APP_HOST_PORT: ${{ secrets.APP_HOST_PORT }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          HOST_PORT="${APP_HOST_PORT:-8000}"
          PARAMS=$(jq -n \
            --arg region "$AWS_DEFAULT_REGION" \
            --arg reg "$ECR_REGISTRY" \
            --arg img "$IMAGE_URI" \
            --arg hp "$HOST_PORT" \
            --arg proj "$AWS_PROJECT_PATH" \
            '{commands: [
              ("set -euo pipefail; : > /tmp/cobip-ai-cd.log; _fail(){ echo \"[cobip-cd] ERROR\" >&2; tail -n 200 /tmp/cobip-ai-cd.log >&2; exit 1; }; cd " + ($proj | @sh) + " || _fail; echo \"[cobip-cd] repo\" >&2; git fetch origin >>/tmp/cobip-ai-cd.log 2>&1 || _fail; echo \"[cobip-cd] fetch\" >&2; git checkout develop >>/tmp/cobip-ai-cd.log 2>&1 || _fail; echo \"[cobip-cd] checkout\" >&2; git pull origin develop >>/tmp/cobip-ai-cd.log 2>&1 || _fail; echo \"[cobip-cd] pull\" >&2; export COBIP_AI_IMAGE=" + ($img | @sh) + "; export COBIP_HOST_PORT=" + ($hp | @sh) + "; aws ecr get-login-password --region " + ($region | @sh) + " | docker login --username AWS --password-stdin " + ($reg | @sh) + " >>/tmp/cobip-ai-cd.log 2>&1 || _fail; echo \"[cobip-cd] ecr\" >&2; docker compose -f docker-compose.deploy.yml pull >>/tmp/cobip-ai-cd.log 2>&1 || _fail; echo \"[cobip-cd] compose-pull\" >&2; docker compose -f docker-compose.deploy.yml up -d >>/tmp/cobip-ai-cd.log 2>&1 || _fail; echo \"[cobip-cd] compose-up\" >&2; docker compose -f docker-compose.deploy.yml ps")
            ]}')
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions CD compose (${IMAGE_TAG})" \
            --timeout-seconds 1800 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM CommandId=${CMD_ID}"

          DEADLINE=$(( $(date +%s) + 1800 ))
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)

            case "${STATUS}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "--- SSM stdout ---"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text 2>/dev/null || true
                echo "--- SSM stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" \
                  --output text 2>/dev/null || true
                exit 1
                ;;
            esac

            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "SSM polling timed out after 30 minutes (last Status=${STATUS:-unknown})"
              echo "--- SSM stdout ---"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text 2>/dev/null || true
              echo "--- SSM stderr ---"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text 2>/dev/null || true
              exit 1
            fi

            sleep 15
          done
