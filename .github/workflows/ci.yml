name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    name: Lint imports & build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python imports (compileall)
        run: python -m compileall app

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest tests/ -q

      - name: Build Docker image
        run: docker build -t cobip-fastapi-ai-server:test .
