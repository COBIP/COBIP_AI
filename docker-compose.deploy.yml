# EC2 배포용: ai-server는 ECR 이미지, Redis/Qdrant/Ollama는 공식 이미지.
# COBIP_AI_IMAGE, COBIP_HOST_PORT 는 배포 스크립트에서 export 한 뒤 docker compose 실행.

services:
  ai-server:
    image: ${COBIP_AI_IMAGE:?set COBIP_AI_IMAGE to ECR image URI}
    ports:
      - "${COBIP_HOST_PORT:-8000}:8000"
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: qwen2.5-coder:1.5b
      RAG_ENABLED: "false"
      RAG_TOP_K: "3"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: cobip_knowledge
      EMBEDDING_MODEL: BAAI/bge-m3
    depends_on:
      - ollama
      - qdrant
      - redis

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  ollama_data:
  qdrant_storage:
