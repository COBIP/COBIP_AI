services:
  fastapi-ai-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # vLLM 서비스 (주석 — 아직 실제 기동하지 않음)
  #
  # - vLLM 은 별도 GPU 서버에서 단독 실행하거나 본 compose 안에서 별도 컨테이너로
  #   실행할 수 있다. FastAPI 는 VLLM_BASE_URL 환경변수를 통해 vLLM 의 OpenAI-호환
  #   /chat/completions 엔드포인트를 호출한다 (예: http://vllm:8000/v1).
  # - GPU 를 사용하려면 호스트에 NVIDIA 드라이버 + nvidia-container-toolkit 이
  #   설치되어 있어야 하며, Docker 의 NVIDIA runtime 설정이 필요할 수 있다.
  # - 아래 예시는 GPU 서버 환경(NVIDIA driver/runtime 버전, CUDA, 메모리 등)에
  #   따라 그대로 동작하지 않을 수 있으므로, 환경에 맞춰 image / runtime /
  #   deploy.resources 를 조정한 뒤 주석을 해제한다.
  # - 모델명은 Qwen2.5-Coder-7B-Instruct 로 둔다.
  # ---------------------------------------------------------------------------
